<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1100" width="900" height="1100">
  <rect width="900" height="1100" fill="#0B0F17"/>
  <text x="40" y="55" font-family="Arial" font-size="26" font-weight="700" fill="#F5F7FA">Fel7o ITI Prep — brand spec</text>
  <text x="40" y="80" font-family="Arial" font-size="13" fill="#8A93A6">Developer-first identity system, extracted from product UI</text>

  <text x="40" y="130" font-family="Arial" font-size="15" font-weight="700" fill="#F5F7FA">Color palette</text>
  <g font-family="Arial" font-size="11" fill="#8A93A6">
    <rect x="40" y="145" width="90" height="60" rx="8" fill="#0B0F17" stroke="#1F2530"/>
    <text x="45" y="220">#0B0F17</text><text x="45" y="234">Background</text>

    <rect x="145" y="145" width="90" height="60" rx="8" fill="#131822"/>
    <text x="150" y="220">#131822</text><text x="150" y="234">Surface / card</text>

    <rect x="250" y="145" width="90" height="60" rx="8" fill="#FF7A1A"/>
    <text x="255" y="220">#FF7A1A</text><text x="255" y="234">Primary accent</text>

    <rect x="355" y="145" width="90" height="60" rx="8" fill="#22D3EE"/>
    <text x="360" y="220">#22D3EE</text><text x="360" y="234">Secondary — cyan</text>

    <rect x="460" y="145" width="90" height="60" rx="8" fill="#8B5CF6"/>
    <text x="465" y="220">#8B5CF6</text><text x="465" y="234">Tertiary — violet</text>

    <rect x="565" y="145" width="90" height="60" rx="8" fill="#22C55E"/>
    <text x="570" y="220">#22C55E</text><text x="570" y="234">Success</text>

    <rect x="670" y="145" width="90" height="60" rx="8" fill="#F5F7FA"/>
    <text x="675" y="220">#F5F7FA</text><text x="675" y="234">Text primary</text>

    <rect x="775" y="145" width="85" height="60" rx="8" fill="#8A93A6"/>
    <text x="780" y="220">#8A93A6</text><text x="780" y="234">Text muted</text>
  </g>

  <text x="40" y="290" font-family="Arial" font-size="15" font-weight="700" fill="#F5F7FA">Icon construction</text>
  <text x="40" y="310" font-family="Arial" font-size="11" fill="#8A93A6">Bracket-built F, single stroke weight, one accent tick (learning-in-progress cursor)</text>

  <g transform="translate(40,330)">
    <rect width="180" height="180" rx="40" fill="#131822"/>
    <path d="M 68 45 L 68 135 M 68 45 L 120 45 M 68 86 L 108 86" fill="none" stroke="#F5F7FA" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="128" cy="124" r="10" fill="#FF7A1A"/>
  </g>
  <g font-family="Arial" font-size="11" fill="#8A93A6">
    <text x="240" y="350">Stroke width : icon width  ≈ 1 : 11</text>
    <text x="240" y="368">Tile corner radius ≈ 22% of tile width</text>
    <text x="240" y="386">Accent tick sits at the F's lower-right terminal</text>
    <text x="240" y="404">Clear space = half tile width on all sides</text>
    <text x="240" y="422">Minimum size: 16px (favicon), tested legible</text>
  </g>

  <text x="40" y="560" font-family="Arial" font-size="15" font-weight="700" fill="#F5F7FA">Typography</text>
  <text x="40" y="600" font-family="Arial" font-size="34" font-weight="700" fill="#F5F7FA">Fel7o ITI Prep</text>
  <text x="40" y="622" font-family="Arial" font-size="12" fill="#8A93A6">Wordmark — bold 700, tight tracking (-1px)</text>
  <text x="40" y="655" font-family="Arial" font-size="16" font-weight="500" fill="#F5F7FA" letter-spacing="1.5">ITI PREP — TAGLINE / EYEBROW SET</text>
  <text x="40" y="677" font-family="Arial" font-size="12" fill="#8A93A6">Eyebrow / label — medium 500, +1.5px tracking, uppercase</text>
  <text x="40" y="712" font-family="Arial" font-size="14" fill="#F5F7FA">Recommended UI font: Inter (Latin) + Cairo (Arabic) — matches dashboard</text>
  <text x="40" y="730" font-family="Arial" font-size="12" fill="#8A93A6">Weights used: 400 body, 500 labels, 700 headings/wordmark only</text>

  <text x="40" y="790" font-family="Arial" font-size="15" font-weight="700" fill="#F5F7FA">Lockups</text>
  <g transform="translate(40,810)">
    <rect width="360" height="90" rx="12" fill="#131822"/>
    <g transform="translate(18,13)">
      <rect width="64" height="64" rx="15" fill="#0B0F17"/>
      <path d="M 24 16 L 24 48 M 24 16 L 42 16 M 24 31 L 38 31" fill="none" stroke="#F5F7FA" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="45" cy="44" r="3.5" fill="#FF7A1A"/>
    </g>
    <text x="98" y="45" font-family="Arial" font-size="24" font-weight="700" fill="#F5F7FA">Fel7o</text>
    <text x="98" y="66" font-family="Arial" font-size="13" font-weight="500" fill="#8A93A6" letter-spacing="1">ITI PREP</text>
  </g>
  <g transform="translate(430,810)">
    <rect width="90" height="90" rx="20" fill="#131822"/>
    <g transform="translate(18,18)">
      <path d="M 22 14 L 22 44 M 22 14 L 40 14 M 22 29 L 36 29" fill="none" stroke="#F5F7FA" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="43" cy="40" r="3.5" fill="#FF7A1A"/>
    </g>
  </g>
  <text x="40" y="930" font-family="Arial" font-size="11" fill="#8A93A6">Horizontal lockup — nav bars, docs headers, README badges</text>
  <text x="430" y="930" font-family="Arial" font-size="11" fill="#8A93A6">Icon-only — favicon, avatar, app icon</text>

  <text x="40" y="990" font-family="Arial" font-size="15" font-weight="700" fill="#F5F7FA">Usage rules</text>
  <text x="40" y="1015" font-family="Arial" font-size="12" fill="#8A93A6">Never stretch, rotate, recolor the tile, or add gradients/glow inside the icon.</text>
  <text x="40" y="1034" font-family="Arial" font-size="12" fill="#8A93A6">On dark UI: white icon on #131822 tile. On light UI: dark icon on white tile.</text>
  <text x="40" y="1053" font-family="Arial" font-size="12" fill="#8A93A6">Accent tick is always #FF7A1A — the one fixed color, everything else can invert.</text>
</svg>
