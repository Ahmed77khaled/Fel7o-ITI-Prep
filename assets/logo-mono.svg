<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Rocket Mask to cut gaps in F and Target Rings -->
    <mask id="rocket-mask-mono">
      <!-- White background to keep everything -->
      <rect x="0" y="0" width="512" height="512" fill="#FFFFFF" />
      <!-- Black diagonal line to cut the gap -->
      <line x1="256" y1="260" x2="420" y2="96" stroke="#000000" stroke-width="36" stroke-linecap="round" />
    </mask>
  </defs>

  <g transform="translate(0, -20)">
    <!-- Masked Group (F and Target Rings) -->
    <g mask="url(#rocket-mask-mono)">
      <!-- Stylized F -->
      <path d="M 172,110 
               L 410,110 
               L 410,154 
               L 220,154 
               L 204,204 
               L 350,204 
               L 350,248 
               L 190,248 
               L 150,370 
               L 106,370 
               Z" 
            fill="currentColor" />

      <!-- Target Rings -->
      <!-- Outer Ring -->
      <path d="M 256,160 
               A 100,100 0 1,1 156,260 
               A 100,100 0 0,1 256,160 Z" 
            fill="none" stroke="currentColor" stroke-width="22" />
      <!-- Mid Ring -->
      <circle cx="256" cy="260" r="60" fill="none" stroke="currentColor" stroke-width="20" />
    </g>

    <!-- Target Center Bullseye (Not masked) -->
    <circle cx="256" cy="260" r="25" fill="currentColor" />

    <!-- Rocket Trail (Drawn on top of the mask gap) -->
    <line x1="256" y1="260" x2="360" y2="156" stroke="currentColor" stroke-width="16" stroke-linecap="round" />

    <!-- Rocket (Rotated and translated) -->
    <g transform="translate(360, 156) rotate(45)">
      <!-- Rocket Body -->
      <path d="M 0,-40 
               C 15,-15 15,15 12,30 
               L -12,30 
               C -15,15 -15,-15 0,-40 Z" 
            fill="currentColor" />
      <!-- Fins -->
      <path d="M -12,10 L -28,30 L -12,24 Z" fill="currentColor" />
      <path d="M 12,10 L 28,30 L 12,24 Z" fill="currentColor" />
      <!-- Window (monochrome hollow circle) -->
      <circle cx="0" cy="-5" r="5" fill="none" stroke="currentColor" stroke-width="2" />
    </g>
  </g>
</svg>
