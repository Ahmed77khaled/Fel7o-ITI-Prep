<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 160" width="100%" height="100%">
  <defs>
    <!-- Rocket Mask to cut gaps in F and Target Rings -->
    <mask id="rocket-mask-horizontal">
      <!-- White background to keep everything -->
      <rect x="0" y="0" width="512" height="512" fill="#FFFFFF" />
      <!-- Black diagonal line to cut the gap -->
      <line x1="256" y1="260" x2="420" y2="96" stroke="#000000" stroke-width="36" stroke-linecap="round" />
    </mask>
  </defs>

  <!-- Left: Icon (scaled down and shifted) -->
  <g transform="translate(10, 0) scale(0.3125)">
    <!-- 512x512 canvas scaled by 0.3125 fits perfectly inside 160px height (512 * 0.3125 = 160) -->
    <!-- Masked Group (F and Target Rings) -->
    <g mask="url(#rocket-mask-horizontal)">
      <!-- Stylized F -->
      <path d="M 172,110 
               L 410,110 
               L 410,154 
               L 220,154 
               L 204,204 
               L 350,204 
               L 350,248 
               L 190,248 
               L 150,370 
               L 106,370 
               Z" 
            fill="#e94560" />

      <!-- Target Rings -->
      <!-- Outer Ring -->
      <path d="M 256,160 
               A 100,100 0 1,1 156,260 
               A 100,100 0 0,1 256,160 Z" 
            fill="none" stroke="#e94560" stroke-width="22" />
      <!-- Mid Ring -->
      <circle cx="256" cy="260" r="60" fill="none" stroke="#e94560" stroke-width="20" />
    </g>

    <!-- Target Center Bullseye -->
    <circle cx="256" cy="260" r="25" fill="#e94560" />

    <!-- Rocket Trail -->
    <line x1="256" y1="260" x2="360" y2="156" stroke="#e94560" stroke-width="16" stroke-linecap="round" />

    <!-- Rocket -->
    <g transform="translate(360, 156) rotate(45)">
      <path d="M 0,-40 C 15,-15 15,15 12,30 L -12,30 C -15,15 -15,-15 0,-40 Z" fill="#e94560" />
      <path d="M -12,10 L -28,30 L -12,24 Z" fill="#e94560" />
      <path d="M 12,10 L 28,30 L 12,24 Z" fill="#e94560" />
      <circle cx="0" cy="-5" r="5" fill="#0d0f1a" />
    </g>
  </g>

  <!-- Right: Text Lockup (starts around x = 180) -->
  <g transform="translate(180, 0)">
    <!-- Text: Fel7o -->
    <!-- fill="currentColor" to allow theme responsiveness, with white as default fallback -->
    <text x="0" y="80" font-family="'Cairo', 'Arial Black', sans-serif" font-weight="900" font-size="56" fill="currentColor" letter-spacing="-1">
      Fel<tspan fill="#e94560">7</tspan>o
    </text>

    <!-- Separator Line -->
    <line x1="0" y1="108" x2="280" y2="108" stroke="#e94560" stroke-width="3" />

    <!-- Text: ITI PREP -->
    <text x="140" y="132" font-family="'Cairo', 'Arial', sans-serif" font-weight="700" font-size="18" fill="#e94560" text-anchor="middle" letter-spacing="5">
      ITI PREP
    </text>
  </g>
</svg>
